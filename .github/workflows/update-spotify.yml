name: Update Spotify chart data

on:
  schedule:
    # Spotify daily charts usually lag by at least one day. This runs in the afternoon China time.
    - cron: "30 7 * * *"
  workflow_dispatch:
    inputs:
      start:
        description: "Optional start date override, YYYY-MM-DD"
        required: false
        default: ""
      end:
        description: "Optional end date override, YYYY-MM-DD"
        required: false
        default: ""

permissions:
  contents: write

env:
  OSS_BUCKET: popchart-data-huangbei
  OSS_REGION: cn-hongkong
  OSS_ENDPOINT: oss-cn-hongkong.aliyuncs.com

jobs:
  update-spotify:
    runs-on: ubuntu-latest
    concurrency:
      group: spotify-data-update
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: npm ci

      - name: Install ossutil
        run: |
          curl -L -o ossutil.zip https://gosspublic.alicdn.com/ossutil/v2/2.3.0/ossutil-2.3.0-linux-amd64.zip
          unzip -q ossutil.zip
          sudo install -m 755 ossutil-2.3.0-linux-amd64/ossutil /usr/local/bin/ossutil

      - name: Configure OSS credentials
        env:
          ALIYUN_ACCESS_KEY_ID: ${{ secrets.ALIYUN_ACCESS_KEY_ID }}
          ALIYUN_ACCESS_KEY_SECRET: ${{ secrets.ALIYUN_ACCESS_KEY_SECRET }}
        run: |
          if [ -z "$ALIYUN_ACCESS_KEY_ID" ] || [ -z "$ALIYUN_ACCESS_KEY_SECRET" ]; then
            echo "::error::Missing ALIYUN_ACCESS_KEY_ID or ALIYUN_ACCESS_KEY_SECRET repository secret."
            exit 1
          fi
          cat > "$HOME/.ossutilconfig" <<EOF
          [default]
          accessKeyID=$ALIYUN_ACCESS_KEY_ID
          accessKeySecret=$ALIYUN_ACCESS_KEY_SECRET
          region=$OSS_REGION
          endpoint=$OSS_ENDPOINT
          EOF

      - name: Restore cached Spotify raw CSVs from OSS
        run: |
          mkdir -p data/raw/spotify/official
          ossutil cp -r "oss://$OSS_BUCKET/raw/spotify" data/raw/spotify/official --update || true

      - name: Restore Spotify Charts browser profile
        env:
          SPOTIFY_CHARTS_PROFILE_ZIP_B64: ${{ secrets.SPOTIFY_CHARTS_PROFILE_ZIP_B64 }}
        run: |
          if [ -z "$SPOTIFY_CHARTS_PROFILE_ZIP_B64" ]; then
            echo "::error::Missing SPOTIFY_CHARTS_PROFILE_ZIP_B64 secret. Export your logged-in .spotify-charts-profile folder as a base64 zip first."
            exit 1
          fi
          echo "$SPOTIFY_CHARTS_PROFILE_ZIP_B64" | base64 -d > spotify-profile.zip
          unzip -q spotify-profile.zip -d .
          test -d .spotify-charts-profile

      - name: Download latest Spotify charts and rebuild public data
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.inputs.start }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --start ${{ github.event.inputs.start }}"
          fi
          if [ -n "${{ github.event.inputs.end }}" ]; then
            EXTRA_ARGS="$EXTRA_ARGS --end ${{ github.event.inputs.end }}"
          fi
          npm run spotify:update:latest -- --regions global,us --lag-days 2 --chunk-days 2 --headless --verify-build $EXTRA_ARGS

      - name: Sync Spotify raw CSVs and public data to OSS
        run: |
          ossutil cp -r data/raw/spotify/official "oss://$OSS_BUCKET/raw/spotify" --update
          ossutil cp -r public/data "oss://$OSS_BUCKET/data" --update

      - name: Commit updated data snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data package.json scripts
          if git diff --cached --quiet; then
            echo "No Spotify data changes to commit."
          else
            git commit -m "chore(data): update spotify charts"
            git push
          fi
